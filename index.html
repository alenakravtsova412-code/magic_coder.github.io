<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой волшебный сайт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 600px; width: 100%; }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255,100,200,0.5);
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; background: linear-gradient(135deg, #667eea, #764ba2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        p { font-size: 1.2rem; margin-bottom: 30px; color: #555; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        button:hover { transform: scale(1.03); }
        button:disabled { opacity: 0.6; }
        .message { margin-top: 20px; font-size: 1.1rem; color: #764ba2; background: #f0eef9; padding: 12px; border-radius: 50px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>✨ Привет, мир! ✨</h1>
        <p>Это моя первая стильная страница, сделанная с любовью и Visual Studio Code.</p>
        <button id="magicButton">Нажми на меня</button>
        <div id="message" class="message hidden"></div>
    </div>
</div>
<script>
    const btn = document.getElementById('magicButton');
    const msg = document.getElementById('message');
    btn.addEventListener('click', () => {
        msg.textContent = '🎉 Волшебство случилось! 🎉';
        msg.classList.remove('hidden');
        btn.textContent = 'Уже нажали';
        btn.disabled = true;
    });
</script>
</body>
</html>
